{% extends 'shop/layouts/main.html' %}
{% block content %}

<section class="bg-light py-4 my-5">
  <div class="container">
    <div class="row">
      <div class="col-12">
        <h4 class="mb-3">Favourite Item</h4>
        <hr style="border-color:#b8bfc2;">
      </div>

      <div class="col-12">
        <table class="table table-bordered text-center align-middle">
          <thead>
            <tr>
              <th>Image</th>
              <th>Product Name</th>
              <th>Price</th>
              <th>Remove</th>
            </tr>
          </thead>
          <tbody>
            {% for item in fav %}
              <tr>
                <td>
                  <img src="{{ item.product.product_image.url }}" height="75px" alt="{{ item.product.name }}">
                </td>
                <td>{{ item.product.name }}</td>
                <td>Rs. {{ item.product.selling_price|stringformat:'d' }}</td>
                <td>
                  <a href="{% url 'remove_fav' item.id %}" class="btn btn-danger btn-sm">
                    <i class="fa fa-trash"></i> Remove
                  </a>
                </td>
              </tr>
            {% empty %}
              <tr>
                <td colspan="4">You have no favourite products.</td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</section>

{% endblock content %}
