{% extends 'shop/layouts/main.html' %}
{% load static %}
{% block title %}
  Login | GoCartz
{% endblock %}
{% block content %}
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .login-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh; /* full screen height */
    background: linear-gradient(rgba(139, 0, 0, 0.35), rgba(139, 0, 0, 0.35)),
                url('{% static "images/login.jpg" %}') center/cover no-repeat;
     border-top: 5px solid #D4AF37;
  }

  .login-card {
    background: rgba(255, 255, 255, 0.95);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
    max-width: 400px;
    width: 100%;
    animation: fadeInUp 0.6s ease-in-out;
  }

  .login-card h4 {
    color: #8B0000;
    font-weight: bold;
    margin-bottom: 20px;
    text-align: center;
  }

  .form-control {
    border-radius: 10px;
    padding: 10px 15px;
    border: 1px solid #ccc;
  }

  .btn-login {
    background-color: #D4AF37;
    color: #8B0000;
    font-weight: bold;
    border: none;
    padding: 10px;
    border-radius: 10px;
    transition: all 0.3s ease;
    width: 100%;
  }

  .btn-login:hover {
    background-color: #bfa030;
    transform: translateY(-2px);
  }

  .login-footer {
    text-align: center;
    margin-top: 15px;
  }

  .login-footer a {
    color: #8B0000;
    text-decoration: none;
  }

  .login-footer a:hover {
    text-decoration: underline;
  }
</style>

<div class="login-wrapper">
  <div class="login-card">
    <h4>User Login</h4>
    {% include 'shop/inc/message.html' %}
    <form method="post" action="">
      {% csrf_token %}
      <div class="mb-4">
        <label for="username" class="form-label">User Name</label>
        <input type="text" name="username" id="username" class="form-control" placeholder="Enter User Name" required>
      </div>
      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <input type="password" name="password" id="password" class="form-control" placeholder="Enter Password" required>
      </div>
      <button type="submit" class="btn-login">Login</button>
    </form>
    <div class="login-footer">
      <p><a href="#">Forgot Password?</a></p>
      <p>Don't have an account? <a href="{% url 'register' %}">Sign Up</a></p>
    </div>
  </div>
</div>

{% endblock content %}
