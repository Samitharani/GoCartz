{% load static %}
<div class="card border-0 shadow-sm seller-sidebar">
  <div class="card-body p-3">
    <div class="d-flex align-items-center mb-3">
      <div class="seller-avatar bg-gold text-dark rounded-circle d-flex align-items-center justify-content-center me-3">
        {{ request.user.username|slice:":1"|upper }}
      </div>
      <div>
        <h5 class="mb-0">{{ request.user.username }}</h5>
        <small class="text-muted">{{ profile.vendor_name }}</small>
      </div>
    </div>
    <div class="list-group list-group-flush seller-menu">
      <a href="{% url 'seller_dashboard' %}" class="list-group-item list-group-item-action d-flex align-items-center justify-content-between {% if seller_active == 'dashboard' %}active{% endif %}">
        <span>Dashboard</span>
        <i class="fa fa-tachometer-alt"></i>
      </a>
      <a href="{% url 'seller_products' %}" class="list-group-item list-group-item-action d-flex align-items-center justify-content-between {% if seller_active == 'products' %}active{% endif %}">
        <span>My Products</span>
        <i class="fa fa-boxes"></i>
      </a>
      <a href="{% url 'seller_add_product' %}" class="list-group-item list-group-item-action d-flex align-items-center justify-content-between {% if seller_active == 'add_product' %}active{% endif %}">
        <span>Add Product</span>
        <i class="fa fa-plus"></i>
      </a>
      <a href="{% url 'seller_orders' %}" class="list-group-item list-group-item-action d-flex align-items-center justify-content-between {% if seller_active == 'orders' %}active{% endif %}">
        <span>Orders</span>
        <i class="fa fa-shopping-basket"></i>
      </a>
      <a href="{% url 'seller_earnings' %}" class="list-group-item list-group-item-action d-flex align-items-center justify-content-between {% if seller_active == 'earnings' %}active{% endif %}">
        <span>Earnings</span>
        <i class="fa fa-wallet"></i>
      </a>
      <a href="{% url 'seller_low_stock' %}" class="list-group-item list-group-item-action d-flex align-items-center justify-content-between {% if seller_active == 'low_stock' %}active{% endif %}">
        <span>Low Stock</span>
        <i class="fa fa-exclamation-triangle"></i>
      </a>
      <a href="{% url 'logout' %}" class="list-group-item list-group-item-action list-group-item-danger d-flex align-items-center justify-content-between text-danger">
        <span>Logout</span>
        <i class="fa fa-power-off"></i>
      </a>
    </div>
  </div>
</div>
